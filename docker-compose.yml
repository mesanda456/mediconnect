services:
  mysql:
    image: mysql:8
    container_name: mediconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: mediconnect_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyourpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: mediconnect-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mediconnect_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 12345
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"

volumes:
  mysql_data: